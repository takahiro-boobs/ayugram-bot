services:
  - type: web
    name: ayugram-admin
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_DB_PATH
        sync: false
      - key: ADMIN_BASE_PATH
        sync: false
      - key: HELPER_API_KEY
        sync: false
      - key: INSTAGRAM_APP_HELPER_OPEN_URL
        sync: false
      - key: PUBLISH_N8N_WEBHOOK_URL
        sync: false
      - key: PUBLISH_BASE_URL
        sync: false
      - key: PUBLISH_SHARED_SECRET
        sync: false
      - key: PUBLISH_RUNNER_API_KEY
        sync: false
      - key: PUBLISH_STAGING_DIR
        sync: false
      - key: PUBLISH_WEBHOOK_MAX_AGE_SECONDS
        sync: false
      - key: PUBLISH_RUNNER_LEASE_SECONDS
        sync: false
      - key: PUBLISH_DEFAULT_WORKFLOW
        sync: false

  - type: worker
    name: ayugram-bot
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python3 bot.py"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: REVIEW_BOT_TOKEN
        sync: false
      - key: REVIEW_ADMIN_ID
        sync: false

  - type: worker
    name: ayugram-review-bot
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python3 review_bot.py"
    envVars:
      - key: REVIEW_BOT_TOKEN
        sync: false
      - key: REVIEW_ADMIN_ID
        sync: false
